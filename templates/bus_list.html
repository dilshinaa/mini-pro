<!DOCTYPE html>
<html>
<head>
    <title>Available Buses</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 520px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .bus-card {
            display: flex;
            align-items: center;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .bus-card:hover {
            background: #f5f8ff;
            transform: translateY(-4px);
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
        }

        .icon {
            font-size: 35px;
            margin-right: 15px;
        }

        .details {
            flex-grow: 1;
        }

        .bus-name {
            font-weight: 600;
            font-size: 18px;
        }

        .route {
            font-size: 14px;
            color: #555;
            margin: 5px 0;
        }

        .arrival {
            font-weight: bold;
            color: green;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚌 Buses from {{ source }} to {{ destination }}</h2>

    {% for bus in buses %}
    <a href="/bus/{{ bus.id }}">
        <div class="bus-card">
            <div class="icon">🚌</div>
            <div class="details">
                <div class="bus-name">{{ bus.name }}</div>
                <div class="route">{{ bus.route }}</div>
                <div class="arrival">
                    Arriving in <span class="timer" data-time="{{ bus.arrival.split(' ')[2] }}"></span> mins
                </div>
            </div>
        </div>
    </a>
    {% endfor %}

    <a class="back" href="/">⬅ Search Again</a>
</div>

<script>
    // Animated Countdown Timer
    const timers = document.querySelectorAll(".timer");

    timers.forEach(timer => {
        let timeLeft = parseInt(timer.dataset.time);
        timer.innerText = timeLeft;

        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timer.innerText = timeLeft;
            } else {
                timer.innerText = "Arrived";
            }
        }, 60000); // decreases every 1 minute
    });
</script>

</body>
</html>
