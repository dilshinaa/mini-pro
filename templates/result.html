<!DOCTYPE html> <html> <head> <title>Bus Result</title> <style> body { font-family: Arial, sans-serif; background: linear-gradient(to right, #1e3c72, #2a5298); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; } .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 8px 20px rgba(0,0,0,0.2); width: 350px; text-align: center; } p { font-size: 16px; margin: 10px 0; } .available { color: green; font-weight: bold; } .crowded { color: red; font-weight: bold; } a { display: inline-block; margin-top: 15px; text-decoration: none; background-color: #2a5298; color: white; padding: 8px 15px; border-radius: 5px; } a:hover { background-color: #1e3c72; } </style> </head> <body> <div class="card"> <h2>Bus Status</h2> <p><strong>From:</strong> {{source}}</p> <p><strong>To:</strong> {{destination}}</p> <p><strong>Passengers:</strong> {{passengers}}</p> <p><strong>Available Seats:</strong> <span class="available">{{available}}</span> </p> <a href="/">Search Again</a> </div> </body> </html>
